name: scientia

services:
  postgres:
    image: postgres:17-alpine
    container_name: scientia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: scientia
      POSTGRES_USER: scientia
      POSTGRES_PASSWORD: scientia_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scientia -d scientia"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - scientia-network

  redis:
    image: redis:7-alpine
    container_name: scientia-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy noeviction
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - scientia-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  scientia-network:
    driver: bridge
