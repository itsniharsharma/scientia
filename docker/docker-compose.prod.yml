name: scientia-prod

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    restart: always
    env_file: ../.env
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - scientia-network

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    restart: always
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - scientia-network

  bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile.bot
    restart: always
    env_file: ../.env
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - scientia-network

  postgres:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-scientia}
      POSTGRES_USER: ${POSTGRES_USER:-scientia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scientia"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scientia-network

  redis:
    image: redis:7-alpine
    restart: always
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scientia-network

volumes:
  postgres_data:
  redis_data:

networks:
  scientia-network:
    driver: bridge
